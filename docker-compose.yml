services:
  db:
    image: postgres:14
    environment:
      POSTGRES_USER: Phionanamugga
      POSTGRES_PASSWORD: '1234'
      POSTGRES_DB: neurosleep
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U Phionanamugga -d neurosleep"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://Phionanamugga:1234@db:5432/neurosleep
    networks:
      - app-network
networks:
  app-network:
    driver: bridge
volumes:
  postgres_data:

  
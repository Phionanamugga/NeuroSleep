<div class="dashboard">
  <!-- Header -->
  <header class="dashboard-header">
    <div class="header-left">
      <img src="static/images/logo.svg" alt="Logo" class="logo-small">
      <h2>Sleep Tracker Pro</h2>
    </div>
    <div class="header-right">
      <span id="who" class="username"></span>
      <button id="btn_logout" class="btn-logout">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        Logout
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="dashboard-content">
    <!-- Sleep Entry Form -->
    <section class="card sleep-entry">
      <h3>Add Sleep Record</h3>
      <form id="sleep-form">
        <div class="form-row">
          <div class="input-group">
            <label for="start">Start Time</label>
            <input id="start" type="datetime-local" required>
          </div>
          <div class="input-group">
            <label for="end">End Time</label>
            <input id="end" type="datetime-local" required>
          </div>
        </div>
        <div class="input-group">
          <label for="notes">Notes</label>
          <textarea id="notes" placeholder="How did you sleep?"></textarea>
        </div>
        <button type="submit" id="btn_add" class="btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Add Entry
        </button>
      </form>
    </section>

    <!-- Stats and Visualization -->
    <section class="card stats-section">
      <div class="stats-header">
        <h3>Your Sleep Statistics</h3>
        <a href="#" id="csv" class="export-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          Export CSV
        </a>
      </div>
      <div class="stats-grid">
        <div class="stats-card">
          <h4>Average Duration</h4>
          <div class="stat-value" id="avg-duration">-</div>
        </div>
        <div class="stats-card">
          <h4>Best Night</h4>
          <div class="stat-value" id="best-night">-</div>
        </div>
        <div class="stats-card">
          <h4>Consistency</h4>
          <div class="stat-value" id="consistency">-</div>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="chart"></canvas>
      </div>
      <pre id="stats" class="raw-stats"></pre>
    </section>
  </main>

  <!-- Footer -->
  <footer class="dashboard-footer">
    <p>© 2023 Sleep Tracker Pro | v1.0.0</p>
  </footer>
</div>
